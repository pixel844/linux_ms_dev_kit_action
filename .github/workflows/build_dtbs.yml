name: Build All QCOM DTBs via Make

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual execution'
        required: false
        default: 'Manual run via UI'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install kernel build dependencies
      run: |
        sudo apt-get update
        # Install necessary tools for general kernel compilation
        sudo apt-get install -y build-essential libncurses-dev flex bison bc libssl-dev device-tree-compiler

    - name: Configure the kernel (QCOM specific example)
      run: |
        # NOTE: You must have a defconfig file in your repository.
        # This example assumes a defconfig is located at 'arch/arm64/configs/your_qcom_defconfig'
        # Replace 'your_qcom_defconfig' with your actual file name.
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # Set up a toolchain if cross-compiling (common for embedded devices)
        # You may need an additional step to install the cross-compiler, e.g., 'apt-get install -y gcc-aarch64-linux-gnu'

        make your_qcom_defconfig

    - name: Compile all DTBs using make
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-

        # This command compiles all DTBs specified by the configuration
        make dtbs

    - name: Upload DTB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: all-compiled-dtbs
        # The DTBs are typically found in a directory like this after 'make dtbs'
        path: |
          arch/arm64/boot/dts/**/*.dtb
