name: Build All DTBs via Make

on:
  push:
    branches:
      - '**' # Trigger on pushes to any branch
  pull_request:
    branches:
      - '**' # Trigger on pull requests to any branch
  workflow_dispatch: # Enable manual triggering from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies and cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses-dev \
          flex \
          bison \
          bc \
          libssl-dev \
          device-tree-compiler \
          gcc-aarch64-linux-gnu # Toolchain for ARM64 cross-compilation

    - name: Set up environment variables
      # Environment variables need to be set in every step that uses `make`
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV

    - name: Configure the kernel
      run: |
        # Ensure a defconfig file exists in your repository, e.g.,
        # arch/arm64/configs/your_qcom_defconfig
        # This command generates the .config file used by `make dtbs`
        make your_qcom_defconfig

    - name: Compile all DTBs using make
      run: |
        # This command compiles all DTBs defined in your .config file
        make dtbs

    - name: List generated DTBs for verification
      run: |
        # Optional step to show which DTBs were created
        find arch/${{ env.ARCH }}/boot/dts/ -name "*.dtb"

    - name: Upload DTB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: all-compiled-dtbs
        path: |
          arch/${{ env.ARCH }}/boot/dts/**/*.dtb
