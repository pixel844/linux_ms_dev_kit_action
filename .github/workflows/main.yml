name: Build QCOM DTBs

on:
  push:
    # Triggers the workflow for pushes to any branch
    branches:
      - '**'
  pull_request:
    # Triggers the workflow for PRs to any branch
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual execution'
        required: false
        default: 'Manual run via UI'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Device Tree Compiler (DTC)
      run: |
        sudo apt-get update
        sudo apt-get install device-tree-compiler -y

    - name: Compile QCOM DTS files to DTBs
      run: |
        # Find and compile only DTS files in directories containing 'qcom'
        for DTS_FILE in $(find . -path '*/qcom/*.dts'); do
          DTB_FILE=$(echo "$DTS_FILE" | sed 's/\.dts/\.dtb/')
          dtc -I dts -O dtb -o "$DTB_FILE" "$DTS_FILE"
        done

    - name: Upload QCOM DTB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: qcom-device-tree-blobs
        path: |
          **/*qcom*/*.dtb
