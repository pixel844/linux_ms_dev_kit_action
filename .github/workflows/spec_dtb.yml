name: Build DTBs for specific branch

on:
  push:
    branches:
      - jg/ubuntu-qcom-x1e-6.17
  pull_request:
    branches:
      - jg/ubuntu-qcom-x1e-6.17
  # Manual trigger
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual execution'
        required: false
        default: 'Manual run via UI'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Device Tree Compiler (DTC)
      run: |
        sudo apt-get update
        sudo apt-get install device-tree-compiler -y

    - name: Compile DTS files to DTBs
      run: |
        for DTS_FILE in $(find . -name "*.dts"); do
          DTB_FILE=$(echo "$DTS_FILE" | sed 's/\.dts/\.dtb/')
          dtc -I dts -O dtb -o "$DTB_FILE" "$DTS_FILE"
        done

    - name: Upload DTB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: device-tree-blobs
        path: |
          **/*.dtb
